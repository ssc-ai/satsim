name: Unit Tests

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit-tests:
    name: Ubuntu 24.04 / Python 3.12
    runs-on: ubuntu-24.04
    container: ubuntu:24.04
    env:
      CUDA_VISIBLE_DEVICES: ""
      LANG: en_US.UTF-8
      LANGUAGE: en_US:en
      LC_ALL: en_US.UTF-8
      SATSIM_SKYFIELD_LOAD_DIR: /root/.skyfield
      SHELL: /bin/bash
      TF_CPP_MIN_LOG_LEVEL: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PIP_NO_PYTHON_VERSION_WARNING: "1"

    steps:
      - name: Install system dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            ca-certificates \
            git \
            software-properties-common \
            python3 \
            python3-dev \
            python3-pip \
            locales \
            zip \
            unzip \
            vim \
            wget
          locale-gen en_US.UTF-8

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          python3 -m pip config set global.break-system-packages true
          python3 -m pip install 'tensorflow~=2.19.0'
          python3 -m pip install --ignore-installed -r requirements_dev.txt
          python3 -m pip install -e .

      - name: Cache Skyfield ephemeris
        run: |
          mkdir -p "${SATSIM_SKYFIELD_LOAD_DIR}"
          cp de421.bsp "${SATSIM_SKYFIELD_LOAD_DIR}/de421.bsp"

      - name: Run unit tests
        run: python3 -m pytest
