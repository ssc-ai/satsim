name: Unit Tests

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit-tests:
    name: Docker Image Unit Tests
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Prepare Docker build context
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python setup.py bdist_wheel
          mkdir -p docs/_build/html
          touch docs/_build/html/.gitkeep

      - name: Build Docker image
        run: |
          docker build \
            --file docker/ubuntu24.04_cuda12.5_py3.12.dockerfile \
            --tag satsim:ci \
            .

      - name: Run unit tests in Docker image
        run: |
          docker run --rm \
            --volume "$PWD:/workspace" \
            --workdir /workspace \
            --env CUDA_VISIBLE_DEVICES="" \
            --env SATSIM_SKYFIELD_LOAD_DIR=/root/.skyfield \
            --env TF_CPP_MIN_LOG_LEVEL=1 \
            satsim:ci \
            /bin/bash -lc "pip3 --no-cache-dir install --ignore-installed -r requirements_dev.txt && python3 -m pytest"
